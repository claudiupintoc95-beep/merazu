<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magazin — Merazu Game</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  background: var(--color-sand-light);
}
.shop-header-wrap {
  text-align: center;
  margin-bottom: 16px;
}
</style>
</head>
<body>

<div class="app-shell">

  <div class="game-header">
    <div class="top-brand">
      <div class="mark"><img src="logo.png" alt="Merazu"></div>
      <div class="name">Merazu Game</div>
    </div>
    <button id="logout-btn" class="btn-icon" title="Deconectare">⏻</button>
  </div>

  <div class="page-content">

    <div class="shop-header-wrap">
      <p class="eyebrow">Magazin</p>
      <h1 style="font-size:22px; margin:0;">Recompensele tale</h1>
    </div>

    <div class="points-bar" style="margin-bottom:24px;">
      <div class="points-card">
        <p class="points-label">Disponibil de folosit</p>
        <p class="points-value" id="wallet-display">— pct</p>
      </div>
    </div>

    <div id="loading-state" style="text-align:center; padding:2rem 0;">
      <div class="loading-spin" style="border-color:rgba(97,99,61,0.3); border-top-color:var(--color-deep); width:28px; height:28px; margin:0 auto;"></div>
    </div>

    <div id="shop-grid" style="display:none; grid-template-columns:1fr 1fr; gap:10px;"></div>

    <div id="redeem-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(43,40,37,0.5); z-index:50; align-items:center; justify-content:center;">
      <div class="card" style="max-width:320px; width:90%; text-align:center;">
        <div style="font-size:32px; margin-bottom:0.5rem;">🎁</div>
        <h2 style="font-size:18px; margin-bottom:6px;" id="modal-title"></h2>
        <p class="subtitle" style="margin-bottom:16px;">Arată acest cod ospătarului la restaurant</p>
        <p style="font-family:monospace; font-size:22px; font-weight:600; color:var(--color-coral); background:var(--color-sand-light); padding:12px; border-radius:var(--radius-sm); margin-bottom:16px;" id="modal-code"></p>
        <button class="btn btn-ghost" id="modal-close">Închide</button>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="game.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Joc
    </a>
    <a href="leaderboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      Clasament
    </a>
    <a href="vault.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Vault
    </a>
    <a href="shop.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Magazin
    </a>
  </nav>

</div>

<script type="module" src="shop.js"></script>
</body>
</html>
